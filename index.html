<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#B00020" />
  <meta name="description" content="Lihan Badenhorst — software, AI, robotics, and web projects." />
  <meta name="author" content="Lihan Badenhorst" />

  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://lihan.dev/" />
  <meta property="og:title" content="Lihan Badenhorst" />
  <meta property="og:description" content="Software, AI, robotics, and web projects." />

  <title>Lihan Badenhorst</title>

  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

  <script>
    // Mark <html> as JS-active before paint so the reveal hidden-state
    // (html.js [data-reveal] { opacity: 0 }) can gate without a flash, and so
    // no-JS users still see the content.
    document.documentElement.classList.add('js');
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Playfair+Display:wght@700;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" />

  <link rel="stylesheet" href="/src/styles.css" />
</head>
<body>
  <div class="aurora" aria-hidden="true"></div>

  <a class="skip-link" href="#hero">Skip to content</a>

  <div class="loader-wrapper" id="loader" aria-hidden="true">
    <div class="loader"></div>
  </div>

  <header class="header" id="header">
    <nav class="navbar container" aria-label="Primary">
      <a href="#hero" class="logo">
        <span class="logo-icon" aria-hidden="true">✦</span>
        <span class="logo-text">Lihan.dev</span>
      </a>

      <ul class="nav-menu" id="navMenu" role="list">
        <!-- Populated by js/router.js -->
      </ul>

      <button class="theme-toggle" id="themeToggle" type="button" aria-label="Switch theme" aria-pressed="false">
        <i class="fas fa-moon" aria-hidden="true"></i>
      </button>

      <button class="mobile-menu-toggle" id="mobileMenuToggle" type="button" aria-label="Toggle navigation menu" aria-expanded="false" aria-controls="navMenu">
        <span class="hamburger" aria-hidden="true"></span>
      </button>
    </nav>
  </header>

  <main class="main" id="main-content">
    <article id="single-page" class="single-page" aria-label="Lihan Badenhorst portfolio and notes">
      <!-- Sections assembled by js/router.js. Each section has data-section,
           an id, and a .section-hero / .section-{slug} class. Reveal hooks via
           [data-reveal] are added by js/router.js to section headers and bodies. -->
    </article>

    <div class="scroll-progress" id="scrollProgress" aria-hidden="true">
      <div class="scroll-progress-bar"></div>
    </div>
  </main>

  <footer class="footer">
    <p>&copy; <span id="year"></span> Lihan Badenhorst. Built with Vite, Tailwind &amp; anime.js.</p>
  </footer>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
